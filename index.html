<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WIND 환각 계산기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/decimal.js/10.4.3/decimal.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #faf9ff;
      --bg2:     #f3f0ff;
      --white:   #ffffff;
      --s1:      #f8f7ff;
      --s2:      #f0eeff;
      --border:  #e8e3ff;
      --border2: #d4cbff;
      --a1:      #9b87f5;   /* soft lavender */
      --a2:      #f587b8;   /* soft pink */
      --a3:      #87d4f5;   /* soft sky */
      --a4:      #f5c887;   /* soft peach */
      --a5:      #87f5c0;   /* soft mint */
      --t1:      #3d3560;
      --t2:      #7b72a8;
      --t3:      #b0a8d4;
      --t4:      #d4cff0;
      --ok:      #6dd5a0;
      --err:     #f57878;
      --shadow:  0 4px 24px rgba(155,135,245,0.12);
      --shadow2: 0 8px 32px rgba(155,135,245,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(155,135,245,0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 80%, rgba(245,135,184,0.07) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(135,212,245,0.05) 0%, transparent 60%);
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 300px; min-height: 100vh;
      background: var(--white);
      border-right: 1.5px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; left: -300px; top: 0; z-index: 200;
      transition: left .32s cubic-bezier(.4,0,.2,1);
      overflow-y: auto;
      box-shadow: 4px 0 24px rgba(155,135,245,0.08);
    }
    .sidebar.open { left: 0; }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .sb-head {
      padding: 20px 16px 14px;
      border-bottom: 1.5px solid var(--border);
      position: sticky; top: 0;
      background: var(--white); z-index: 5;
    }
    .sb-logo {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900; font-size: 15px;
      color: var(--a1); margin-bottom: 12px;
    }
    .sb-logo-dot {
      width: 8px; height: 8px; background: var(--a1);
      border-radius: 50%; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
    .io-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .btn-pill {
      padding: 9px 6px; font-size: 11px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      border: 1.5px solid transparent; border-radius: 12px;
      cursor: pointer; transition: all .18s; line-height: 1.45; text-align: center;
    }
    .btn-lav { background: #f0eeff; color: var(--a1); border-color: var(--border2); }
    .btn-lav:hover { background: var(--a1); color: #fff; border-color: var(--a1); }
    .btn-pnk { background: #fff0f6; color: var(--a2); border-color: #f5c8de; }
    .btn-pnk:hover { background: var(--a2); color: #fff; border-color: var(--a2); }
    .btn-sky { background: #f0f9ff; color: #5ab5e0; border-color: #c5e8f7; font-size: 11px; }
    .btn-sky:hover { background: var(--a3); color: #fff; border-color: var(--a3); }
    .btn-pch { background: #fffbf0; color: #d4943a; border-color: #f5deb0; font-size: 11px; }
    .btn-pch:hover { background: var(--a4); color: #fff; border-color: var(--a4); }

    /* add form */
    .add-form {
      overflow: hidden; max-height: 0;
      transition: max-height .3s ease;
      background: var(--s1);
      border-bottom: 1.5px solid var(--border);
    }
    .add-form.open { max-height: 700px; }
    .add-form-inner { padding: 14px; }
    .f-section {
      font-size: 10px; letter-spacing: 1.5px; color: var(--t3);
      text-transform: uppercase; margin: 10px 0 5px;
      font-family: 'Nunito', sans-serif; font-weight: 700;
    }
    .f-section:first-child { margin-top: 0; }
    .f-input {
      width: 100%; padding: 8px 11px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--t1); font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif; margin-bottom: 4px;
      transition: border-color .18s, box-shadow .18s;
    }
    .f-input:focus { outline: none; border-color: var(--a1); box-shadow: 0 0 0 3px rgba(155,135,245,.1); }
    .f-input::placeholder { color: var(--t4); }
    .btn-submit {
      width: 100%; padding: 9px; margin-top: 6px;
      background: linear-gradient(135deg, var(--a1), #b8a6ff);
      color: #fff; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: all .18s;
      box-shadow: 0 3px 12px rgba(155,135,245,.25);
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(155,135,245,.35); }
    .btn-submit:active { transform: scale(.98); }

    /* pet list */
    .pet-section { padding: 10px 12px; flex: 1; }
    .pet-sec-title {
      font-size: 10px; letter-spacing: 2px; color: var(--t3);
      text-transform: uppercase; margin-bottom: 8px;
      font-family: 'Nunito', sans-serif; font-weight: 800;
    }
    .pet-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 10px; margin-bottom: 5px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 12px; cursor: pointer; transition: all .15s;
    }
    .pet-item:hover { border-color: var(--a1); box-shadow: 0 3px 12px rgba(155,135,245,.12); transform: translateY(-1px); }
    .pet-item.active { border-color: var(--a1); background: #f5f0ff; box-shadow: 0 3px 14px rgba(155,135,245,.15); }
    .pet-item-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 6px; color: var(--t1); }
    .pet-item-btns { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-sm {
      padding: 3px 8px; font-size: 11px; font-weight: 700;
      border: 1.5px solid transparent; border-radius: 7px;
      cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all .13s;
    }
    .btn-edit-sm { background: #fffbf0; color: #c8843a; border-color: #f5deb0; }
    .btn-edit-sm:hover { background: var(--a4); color: #fff; }
    .btn-del-sm { background: #fff5f5; color: var(--err); border-color: #f5c5c5; }
    .btn-del-sm:hover { background: var(--err); color: #fff; }

    /* edit form */
    .edit-form { padding: 9px; background: var(--s2); border-radius: 10px; margin-top: 6px; border: 1.5px solid var(--border); }
    .edit-form input {
      width: 100%; padding: 6px 9px; background: var(--white);
      border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--t1); font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif; margin-bottom: 4px;
    }
    .edit-form input:focus { outline: none; border-color: var(--a1); }
    .btn-save {
      width: 100%; padding: 7px; background: var(--ok);
      color: #fff; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background .15s;
    }
    .btn-save:hover { background: #5bc98e; }

    /* toggle btn */
    .toggle-btn {
      position: fixed; top: 16px; left: 16px; z-index: 300;
      width: 42px; height: 42px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--a1); font-size: 19px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .18s; box-shadow: var(--shadow);
    }
    .toggle-btn:hover { border-color: var(--a1); box-shadow: var(--shadow2); transform: scale(1.05); }
    .toggle-btn.sb-open { left: 314px; }

    /* main */
    .main { flex: 1; margin-left: 0; transition: margin-left .32s cubic-bezier(.4,0,.2,1); min-height: 100vh; }
    .main.shifted { margin-left: 300px; }
    .main-inner { max-width: 520px; margin: 0 auto; padding: 24px 18px 80px; }

    /* header */
    .page-head { text-align: center; padding: 18px 0 26px; }
    .wind-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #f0eeff, #ffeef6);
      border: 1.5px solid var(--border2); border-radius: 99px;
      padding: 4px 14px; font-size: 11px; font-weight: 800;
      font-family: 'Nunito', sans-serif;
      color: var(--a1); letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .wind-badge-dot { width: 6px; height: 6px; background: var(--a2); border-radius: 50%; }
    .page-title {
      font-family: 'Nunito', sans-serif;
      font-size: 34px; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--a1) 0%, var(--a2) 60%, var(--a4) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.15; margin-bottom: 6px;
    }
    .page-sub { font-size: 12px; color: var(--t3); font-family: 'Nunito', sans-serif; font-weight: 600; letter-spacing: 0.5px; }

    /* decorative dots */
    .deco-dots { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
    .deco-dot { width: 5px; height: 5px; border-radius: 50%; }

    /* notice */
    .notice {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 18px; padding: 18px 20px;
      font-size: 13px; color: var(--t2); line-height: 1.85;
      text-align: center; margin-bottom: 18px;
      box-shadow: var(--shadow);
      position: relative; overflow: hidden;
    }
    .notice::before {
      content: '✦';
      position: absolute; top: 10px; left: 14px;
      font-size: 14px; color: var(--a1); opacity: .3;
    }
    .notice::after {
      content: '✦';
      position: absolute; bottom: 10px; right: 14px;
      font-size: 14px; color: var(--a2); opacity: .3;
    }
    .notice em { color: var(--a1); font-style: normal; font-weight: 700; }
    .notice small { color: var(--t4); font-size: 11px; }

    /* card */
    .card {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 20px; margin-bottom: 14px;
      box-shadow: var(--shadow); transition: box-shadow .2s;
    }
    .card:hover { box-shadow: var(--shadow2); }
    .card-title {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--t3); margin-bottom: 14px;
      font-family: 'Nunito', sans-serif; font-weight: 800;
      display: flex; align-items: center; gap: 7px;
    }
    .card-title::before {
      content: ''; display: block; width: 10px; height: 10px;
      border-radius: 50%; background: linear-gradient(135deg, var(--a1), var(--a2));
    }

    /* fields */
    .field { margin-bottom: 12px; position: relative; }
    .field-label {
      font-size: 12px; font-weight: 700; color: var(--t2);
      margin-bottom: 5px; display: block; letter-spacing: .3px;
    }
    .field-input {
      width: 100%; padding: 11px 14px;
      background: var(--s1); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--t1); font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    .field-input:focus {
      outline: none; border-color: var(--a1); background: #fff;
      box-shadow: 0 0 0 4px rgba(155,135,245,.1);
    }
    .field-input::placeholder { color: var(--t4); }

    /* suggestions */
    .sugg-wrap { position: relative; }
    .suggestions {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
      background: var(--white); border: 1.5px solid var(--a1);
      border-top: none; border-radius: 0 0 14px 14px;
      max-height: 160px; overflow-y: auto;
      box-shadow: 0 12px 32px rgba(155,135,245,.15);
    }
    .sugg-item {
      padding: 10px 14px; cursor: pointer; font-size: 14px;
      border-bottom: 1px solid var(--border); transition: background .13s; color: var(--t1);
    }
    .sugg-item:last-child { border-bottom: none; }
    .sugg-item:hover { background: var(--s1); color: var(--a1); }

    /* stat grid */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-field { position: relative; }
    .stat-badge {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 10px; font-weight: 800; font-family: 'Nunito', sans-serif;
      pointer-events: none; letter-spacing: .5px;
    }
    .badge-atk { color: var(--a2); }
    .badge-def { color: var(--a1); }
    .badge-agi { color: #5acba8; }
    .badge-hp  { color: #d4943a; }

    /* calc btn */
    .btn-calc {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--a1) 0%, var(--a2) 100%);
      color: #fff; border: none; border-radius: 16px;
      font-size: 16px; font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer; transition: all .2s; letter-spacing: .5px;
      box-shadow: 0 4px 20px rgba(155,135,245,.3);
    }
    .btn-calc:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(155,135,245,.42); }
    .btn-calc:active { transform: scale(.99); }

    /* loading */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; padding: 30px; color: var(--a1); font-size: 14px;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--border2);
      border-top-color: var(--a1); border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* result */
    .result-card {
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 24px; margin-top: 14px;
      box-shadow: var(--shadow); animation: fadeUp .3s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .result-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 13px 0; border-bottom: 1.5px solid var(--border);
    }
    .result-row:last-of-type { border-bottom: none; }
    .result-label { font-size: 13px; color: var(--t2); font-weight: 600; }
    .result-val { font-family: 'Nunito', sans-serif; font-weight: 900; }
    .result-prob   { font-size: 28px; color: var(--a1); }
    .result-appear { font-size: 24px; color: #5acba8; }
    .result-expect { font-size: 24px; color: #d4943a; }
    .result-msg {
      font-size: 12px; color: var(--t3); text-align: center;
      margin-top: 10px; font-style: italic;
    }
    .result-err { color: var(--err); text-align: center; font-size: 14px; padding: 8px 0; font-weight: 600; }

    /* result decoration strip */
    .result-strip {
      height: 4px; border-radius: 99px;
      background: linear-gradient(90deg, var(--a1), var(--a2), var(--a4));
      margin-bottom: 20px;
    }

    /* toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 500;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 12px 18px; font-size: 13px;
      color: var(--t1); box-shadow: var(--shadow2);
      animation: toastIn .25s ease; max-width: 240px; font-weight: 600;
    }
    @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .toast.ok  { border-color: var(--ok);  color: #3d9e6e; }
    .toast.err { border-color: var(--err); color: var(--err); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--a1); }

    @media (max-width: 500px) {
      .main-inner { padding: 14px 12px 80px; }
      .page-title  { font-size: 26px; }
      .toggle-btn.sb-open { left: auto; right: 16px; }
    }
  </style>
</head>
<body>

<!-- ───── Sidebar ───── -->
<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">
      <div class="sb-logo-dot"></div>
      Pet Manager
    </div>
    <div class="btn-row">
      <button class="btn-pill btn-lav" id="toggle-s-btn">페트 추가<br>(초기치/성장률)</button>
      <button class="btn-pill btn-pnk" id="toggle-f-btn">페트 추가<br>(소숫점 초기치)</button>
    </div>
    <div class="io-row">
      <button class="btn-pill btn-sky" id="export-btn">⬆ 내보내기</button>
      <button class="btn-pill btn-pch" id="import-btn-trigger">⬇ 가져오기</button>
      <input type="file" id="import-input" accept=".json" style="display:none" />
    </div>
  </div>

  <!-- S급 폼 -->
  <div class="add-form" id="s-grade-form">
    <div class="add-form-inner">
      <div class="f-section">페트 이름</div>
      <input class="f-input" id="s-name" placeholder="페트 이름" />
      <div class="f-section">S급 초기치</div>
      <input class="f-input" id="s-st1" type="number" placeholder="공격력 초기치" step="any" />
      <input class="f-input" id="s-df1" type="number" placeholder="방어력 초기치" step="any" />
      <input class="f-input" id="s-de1" type="number" placeholder="순발력 초기치" step="any" />
      <input class="f-input" id="s-hp1" type="number" placeholder="체력 초기치" step="any" />
      <div class="f-section">S급 성장률</div>
      <input class="f-input" id="s-st2" type="number" placeholder="공격력 성장률" step="any" />
      <input class="f-input" id="s-df2" type="number" placeholder="방어력 성장률" step="any" />
      <input class="f-input" id="s-de2" type="number" placeholder="순발력 성장률" step="any" />
      <input class="f-input" id="s-hp2" type="number" placeholder="체력 성장률" step="any" />
      <button class="btn-submit" id="add-s-btn">✦ 추가하기</button>
    </div>
  </div>

  <!-- 소숫점 폼 -->
  <div class="add-form" id="final-form">
    <div class="add-form-inner">
      <div class="f-section">페트 이름</div>
      <input class="f-input" id="f-name" placeholder="페트 이름" />
      <div class="f-section">소숫점 초기치</div>
      <input class="f-input" id="f-atk" type="number" placeholder="공격력" step="any" />
      <input class="f-input" id="f-def" type="number" placeholder="방어력" step="any" />
      <input class="f-input" id="f-agi" type="number" placeholder="순발력" step="any" />
      <input class="f-input" id="f-hp"  type="number" placeholder="체력"   step="any" />
      <button class="btn-submit" id="add-f-btn">✦ 추가하기</button>
    </div>
  </div>

  <div class="pet-section">
    <div class="pet-sec-title" id="pet-list-title">등록된 페트</div>
    <div id="pet-list"></div>
  </div>
</div>

<!-- Toggle btn -->
<button class="toggle-btn" id="toggle-btn">☰</button>

<!-- ───── Main ───── -->
<div class="main" id="main">
  <div class="main-inner">

    <!-- Header -->
    <div class="page-head">
      <div class="wind-badge"><div class="wind-badge-dot"></div>WIND SERVER</div>
      <h1 class="page-title">환각 계산기</h1>
      <p class="page-sub">🌸 pet hallucination calculator 🌸</p>
      <div class="deco-dots">
        <div class="deco-dot" style="background:var(--a1)"></div>
        <div class="deco-dot" style="background:var(--a2)"></div>
        <div class="deco-dot" style="background:var(--a3)"></div>
        <div class="deco-dot" style="background:var(--a4)"></div>
        <div class="deco-dot" style="background:var(--a5)"></div>
      </div>
    </div>

    <!-- Notice -->
    <div class="notice">
      이 계산기는 
      <em>윈드서버 루믹스</em>가 제작하였습니다.<br><br>
      모든 계산 결과가 정확하다고 할 수 없습니다.<br>
      단순 참고용으로 사용해주세요 🌷<br>

<!-- Toast -->
<div id="toast" class="toast" style="display:none"></div>

<script>
Decimal.set({ precision: 50, rounding: Decimal.ROUND_HALF_UP });

/* ──── helpers ──── */
function getChosung(str) {
  const B=0xAC00,L=0xD7A3,C=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
  return [...str].map(c=>{const code=c.charCodeAt(0);return(code>=B&&code<=L)?C[Math.floor((code-B)/588)]:c;}).join("");
}
function formatPct(num) {
  if(num===0) return "0.0%";
  let s=num.toFixed(20),di=s.indexOf('.');
  if(di===-1) return s+"%";
  let fn=di+1;
  while(fn<s.length&&s[fn]==='0') fn++;
  if(fn===s.length) return "0.0%";
  let d=s[fn],nx=parseInt(s[fn+1])||0;
  if(nx>=5){
    let inc=(parseInt(d)+1).toString();
    if(inc==='10'){
      let a=s.split(''),c=1;
      for(let i=fn;i>di;i--){if(a[i]==='.') continue;let nd=parseInt(a[i])+c;if(nd===10){a[i]='0';c=1;}else{a[i]=nd.toString();c=0;break;}}
      if(c===1)a.unshift('1');s=a.join('');
    } else { s=s.slice(0,fn)+inc+s.slice(fn+1); }
  }
  return s.slice(0,fn+1)+"%";
}

let toastTimer=null;
function showToast(msg, type="ok") {
  const el=document.getElementById("toast");
  el.textContent=msg; el.className="toast "+type; el.style.display="block";
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ el.style.display="none"; },2400);
}

/* ──── default data ──── */
const DEFAULT_PETS = {
  "짜얄(kiketiti)": {initialCoefficient:17,healthCoefficient:25,attackCoefficient:24,defenseCoefficient:9,agilityCoefficient:34},
  "유미(lunya0519)":  {initialCoefficient:24,healthCoefficient:36,attackCoefficient:20,defenseCoefficient:36,agilityCoefficient:15},
};
let petData = {...DEFAULT_PETS, ...(JSON.parse(localStorage.getItem("windPets")||"{}"))};
function savePets(){ localStorage.setItem("windPets", JSON.stringify(petData)); }

/* ──── stat calc ──── */
function calcIdeal(pet) {
  const ic=pet.initialCoefficient;
  const iA=(pet.attackCoefficient+4.5)*ic/100;
  const iD=(pet.defenseCoefficient+4.5)*ic/100;
  const iG=(pet.agilityCoefficient+4.5)*ic/100;
  const iH=(pet.healthCoefficient+4.5)*ic/100;
  return {
    atk: Math.floor(iH*0.1+iA+iD*0.1+iG*0.05),
    def: Math.floor(iH*0.1+iA*0.1+iD+iG*0.05),
    agi: Math.floor(iG),
    hp:  Math.floor(iH*4+iA+iD+iG),
  };
}

/* ──── main calculation ──── */
function runCalc(pet, dAtk, dDef, dAgi, dHp) {
  let totalCases=0, hallCases=0, exactCount=0, totalPossible=0;
  for(let ar=-2;ar<=2;ar++) for(let dr=-2;dr<=2;dr++) for(let gr=-2;gr<=2;gr++) for(let hr=-2;hr<=2;hr++)
    for(let ab=0;ab<=10;ab++) for(let db=0;db<=10;db++) for(let gb=0;gb<=10;gb++){
      const hb=10-ab-db-gb;
      if(hb<0||hb>10) continue;
      const bA=pet.attackCoefficient+ar+ab,bD=pet.defenseCoefficient+dr+db,bG=pet.agilityCoefficient+gr+gb,bH=pet.healthCoefficient+hr+hb;
      const ic=pet.initialCoefficient;
      const iA=bA*ic/100,iD=bD*ic/100,iG=bG*ic/100,iH=bH*ic/100;
      const cA=Math.floor(iH*0.1+iA+iD*0.1+iG*0.05),cD=Math.floor(iH*0.1+iA*0.1+iD+iG*0.05),cG=Math.floor(iG),cH=Math.floor(iH*4+iA+iD+iG);
      totalPossible++;
      if(cA===dAtk&&cD===dDef&&cG===dAgi&&cH===dHp){
        exactCount++; totalCases++;
        if(ar===2&&dr===2&&gr===2&&hr===2) hallCases++;
      }
    }
  return {totalCases,hallCases,exactCount,totalPossible};
}

/* ──── solve equations (for S grade) ──── */
function solveEq(hp2,st2,df2,de2,e) {
  const fac=e/10000, d=de2*10000/e-2.5;
  const dP=d+2.5, dT=dP*fac;
  const B=[hp2-dT, st2-dT*0.05, df2-dT*0.05];
  const A=[[fac*4,fac,fac],[fac*0.1,fac,fac*0.1],[fac*0.1,fac*0.1,fac]];
  const aug=A.map((row,i)=>[...row,B[i]]);
  for(let i=0;i<3;i++){
    let mi=i,mv=Math.abs(aug[i][i]);
    for(let j=i+1;j<3;j++) if(Math.abs(aug[j][i])>mv){mi=j;mv=Math.abs(aug[j][i]);}
    if(mi!==i)[aug[i],aug[mi]]=[aug[mi],aug[i]];
    const piv=aug[i][i];
    for(let j=i;j<4;j++) aug[i][j]/=piv;
    for(let k=0;k<3;k++) if(k!==i){const f=aug[k][i];for(let j=i;j<4;j++) aug[k][j]-=f*aug[i][j];}
  }
  const a=Math.round(aug[0][3]-2.5),b=Math.round(aug[1][3]-2.5),c=Math.round(aug[2][3]-2.5);
  const aP=a+2.5,bP=b+2.5,cP=c+2.5;
  const diff=Math.abs(+(aP*fac*4+bP*fac+cP*fac+dP*fac).toFixed(2)-hp2)
            +Math.abs(+(aP*fac*0.1+bP*fac+cP*fac*0.1+dP*fac*0.05).toFixed(2)-st2)
            +Math.abs(+(aP*fac*0.1+bP*fac*0.1+cP*fac+dP*fac*0.05).toFixed(2)-df2)
            +Math.abs(+(dP*fac).toFixed(2)-de2);
  return {a,b,c,d,diff,e};
}

function tryCoeff(fH,fA,fD,fG,tol) {
  for(let ic=10;ic<=100;ic++){
    const agi=(fG*100/ic)-4.5;
    if(agi<=0||Math.abs(agi-Math.round(agi))>tol) continue;
    const e1=fH-fG,e2=fA-0.05*fG,e3=fD-0.05*fG,e4=e2-e1,e5=e3-0.1*e1;
    const mul=3/3.9;
    const C=(e5*10-e4*mul)/(9+0.9*mul);
    const A=(e5-0.9*C)/-0.3,B=e1-4*A-C;
    if(A<0||B<0||C<0) continue;
    const hc=(A*100/ic)-4.5,ac=(B*100/ic)-4.5,dc=(C*100/ic)-4.5;
    if(Math.abs(hc-Math.round(hc))>tol||Math.abs(ac-Math.round(ac))>tol||Math.abs(dc-Math.round(dc))>tol) continue;
    return {initialCoefficient:ic,healthCoefficient:Math.round(hc),attackCoefficient:Math.round(ac),defenseCoefficient:Math.round(dc),agilityCoefficient:Math.round(agi)};
  }
  return null;
}

/* ──── render pet list ──── */
let selectedPet = "";
function renderPetList() {
  const cont = document.getElementById("pet-list");
  const names = Object.keys(petData).sort((a,b)=>a.localeCompare(b,'ko-KR'));
  document.getElementById("pet-list-title").textContent = `등록된 페트 (${names.length})`;
  cont.innerHTML = "";
  names.forEach(name => {
    const wrapper = document.createElement("div");

    const item = document.createElement("div");
    item.className = "pet-item" + (name===selectedPet?" active":"");

    const nameSpan = document.createElement("span");
    nameSpan.className = "pet-item-name"; nameSpan.textContent = name;

    const btns = document.createElement("div");
    btns.className = "pet-item-btns";

    const editBtn = document.createElement("button");
    editBtn.className = "btn-sm btn-edit-sm"; editBtn.textContent = "수정";
    editBtn.onclick = e => { e.stopPropagation(); toggleEditForm(wrapper, name); };

    const delBtn = document.createElement("button");
    delBtn.className = "btn-sm btn-del-sm"; delBtn.textContent = "삭제";
    delBtn.onclick = e => {
      e.stopPropagation();
      if(!confirm(`${name}을(를) 삭제할까요?`)) return;
      delete petData[name]; savePets(); renderPetList();
      if(selectedPet===name){
        selectedPet="";
        document.getElementById("pet-name").value="";
        ["d-atk","d-def","d-agi","d-hp"].forEach(id=>document.getElementById(id).value="");
      }
      showToast(`${name} 삭제됨!`,"err");
    };

    item.onclick = () => { selectPet(name); };
    btns.appendChild(editBtn); btns.appendChild(delBtn);
    item.appendChild(nameSpan); item.appendChild(btns);
    wrapper.appendChild(item);
    cont.appendChild(wrapper);
  });
}

function toggleEditForm(wrapper, name) {
  let ef = wrapper.querySelector(".edit-form");
  if(ef){ ef.style.display = ef.style.display==="block"?"none":"block"; return; }
  ef = document.createElement("div"); ef.className="edit-form";
  const pet = petData[name];
  const fields=[
    {ph:"초기 계수 (IC)", val:pet.initialCoefficient},
    {ph:"공격력 계수",    val:pet.attackCoefficient},
    {ph:"방어력 계수",    val:pet.defenseCoefficient},
    {ph:"순발력 계수",    val:pet.agilityCoefficient},
    {ph:"체력 계수",     val:pet.healthCoefficient},
  ];
  const inputs = fields.map(f=>{
    const inp=document.createElement("input");
    inp.type="number"; inp.placeholder=f.ph; inp.value=f.val; ef.appendChild(inp); return inp;
  });
  const saveBtn=document.createElement("button"); saveBtn.className="btn-save"; saveBtn.textContent="저장";
  saveBtn.onclick=e=>{
    e.stopPropagation();
    const v=inputs.map(i=>parseInt(i.value));
    if(v.some(isNaN)){alert("숫자만 입력해주세요!");return;}
    petData[name]={initialCoefficient:v[0],attackCoefficient:v[1],defenseCoefficient:v[2],agilityCoefficient:v[3],healthCoefficient:v[4]};
    savePets(); renderPetList();
    if(selectedPet===name){ const s=calcIdeal(petData[name]); setStats(s); }
    showToast(`${name} 수정됨!`);
  };
  ef.appendChild(saveBtn);
  wrapper.appendChild(ef); ef.style.display="block";
}

function setStats(s){
  document.getElementById("d-atk").value=s.atk;
  document.getElementById("d-def").value=s.def;
  document.getElementById("d-agi").value=s.agi;
  document.getElementById("d-hp").value=s.hp;
}

function selectPet(name){
  selectedPet=name;
  document.getElementById("pet-name").value=name;
  document.getElementById("suggestions").style.display="none";
  setStats(calcIdeal(petData[name]));
  document.getElementById("result-card").style.display="none";
  renderPetList();
}

/* ──── autocomplete ──── */
const petNameInput = document.getElementById("pet-name");
const suggEl = document.getElementById("suggestions");
petNameInput.addEventListener("input",()=>{
  const q=petNameInput.value.trim(); suggEl.innerHTML="";
  if(!q){ suggEl.style.display="none"; return; }
  const qcs=getChosung(q);
  const matches=Object.keys(petData).filter(n=>n.includes(q)||getChosung(n).includes(qcs)).sort((a,b)=>a.localeCompare(b,'ko-KR'));
  if(!matches.length){ suggEl.style.display="none"; return; }
  matches.forEach(m=>{
    const li=document.createElement("div"); li.className="sugg-item"; li.textContent=m;

/* ──── add S grade ──── */
document.getElementById("add-s-btn").addEventListener("click",()=>{
  const name=document.getElementById("s-name").value.trim();
  const hp1=document.getElementById("s-hp1").value, hp2=document.getElementById("s-hp2").value;
  const st1=document.getElementById("s-st1").value, st2=document.getElementById("s-st2").value;
  const df1=document.getElementById("s-df1").value, df2=document.getElementById("s-df2").value;
  const de1=document.getElementById("s-de1").value, de2=document.getElementById("s-de2").value;
  if(!name||!hp1||!hp2||!st1||!st2||!df1||!df2||!de1||!de2){ alert("모든 필드를 채워주세요!"); return; }
  if(petData[name]){ alert("이미 존재하는 이름입니다!"); return; }

  const eVals=[575,555,535,515,495,475];
  let best=null,minD=Infinity;
  for(const e of eVals){ try{const s=solveEq(+hp2,+st2,+df2,+de2,e);if(s.diff<minD){minD=s.diff;best=s;}}catch{} }
  if(!best){ alert("계수를 찾을 수 없습니다!"); return; }

  const fac=best.e/10000;
  const aP=best.a+2.5,bP=best.b+2.5,cP=best.c+2.5,dP=best.d+2.5;
  let fH,fA,fD,fG,found=false;
  for(let i=1;i<100;i++){
    const k=i/100;
    if(Math.floor((aP*k)*4+(bP*k)+(cP*k)+(dP*k))===Math.floor(+hp1)){
      fH=(aP*k)*4+bP*k+cP*k+dP*k;
      fA=(aP*k)*0.1+bP*k+(cP*k)*0.1+(dP*k)*0.05;
      fD=(aP*k)*0.1+(bP*k)*0.1+cP*k+(dP*k)*0.05;
      fG=dP*k; found=true; break;
    }
  }
  if(!found){ alert("초기치 소숫점 계산 실패!"); return; }
  const result=tryCoeff(fH,fA,fD,fG,0.1)||tryCoeff(fH,fA,fD,fG,0.2);
  if(!result){ alert(`유효한 계수를 찾을 수 없습니다!\n체력:${fH.toFixed(3)} 공격:${fA.toFixed(3)} 방어:${fD.toFixed(3)} 순발:${fG.toFixed(3)}`); return; }
  petData[name]=result; savePets(); renderPetList();
  ["s-name","s-hp1","s-hp2","s-st1","s-st2","s-df1","s-df2","s-de1","s-de2"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("s-grade-form").classList.remove("open");
  showToast(`🌸 ${name} 추가 완료!`);
});

/* ──── add final stats ──── */
document.getElementById("add-f-btn").addEventListener("click",()=>{
  const name=document.getElementById("f-name").value.trim();
  const fH=+document.getElementById("f-hp").value, fA=+document.getElementById("f-atk").value;
  const fD=+document.getElementById("f-def").value, fG=+document.getElementById("f-agi").value;
  if(!name||[fH,fA,fD,fG].some(v=>v===""||isNaN(v))){ alert("모든 필드를 채워주세요!"); return; }
  if(petData[name]){ alert("이미 존재하는 이름입니다!"); return; }
  const result=tryCoeff(fH,fA,fD,fG,0.1)||tryCoeff(fH,fA,fD,fG,0.2);
  if(!result){ alert("유효한 계수를 찾을 수 없습니다!"); return; }
  petData[name]=result; savePets(); renderPetList();
  ["f-name","f-hp","f-atk","f-def","f-agi"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("final-form").classList.remove("open");
  showToast(`🌸 ${name} 추가 완료!`);
});

/* ──── export / import ──── */
document.getElementById("export-btn").addEventListener("click",()=>{
  const user=Object.fromEntries(Object.entries(petData).filter(([k])=>!DEFAULT_PETS[k]));
  const blob=new Blob([JSON.stringify(user,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`WIND환각계산기_${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast("내보내기 완료! 🌷");
});
document.getElementById("import-btn-trigger").addEventListener("click",()=>document.getElementById("import-input").click());
document.getElementById("import-input").addEventListener("change",e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const imp=JSON.parse(ev.target.result);
      if(typeof imp!=="object") throw new Error();
      Object.assign(petData,imp); savePets(); renderPetList();
      showToast(`${Object.keys(imp).length}개 가져오기 완료!`);
    } catch{ showToast("파일 형식 오류!","err"); }
  };
  r.readAsText(file); e.target.value="";
});

/* ──── calculate ──── */
document.getElementById("calc-btn").addEventListener("click",()=>{
  const loading=document.getElementById("loading");
  const rc=document.getElementById("result-card");
  rc.style.display="none"; loading.style.display="flex";

  const pet=petData[selectedPet];
  const dAtk=parseInt(document.getElementById("d-atk").value);
  const dDef=parseInt(document.getElementById("d-def").value);
  const dAgi=parseInt(document.getElementById("d-agi").value);
  const dHp =parseInt(document.getElementById("d-hp").value);

  if(!selectedPet||!pet||[dAtk,dDef,dAgi,dHp].some(isNaN)){
    loading.style.display="none";
    rc.innerHTML=`<div class="result-err">✦ 페트와 스탯을 모두 입력해주세요!</div>`;
    rc.style.display="block"; return;
  }

  setTimeout(()=>{
    const r=runCalc(pet,dAtk,dDef,dAgi,dHp);
    loading.style.display="none";
    if(r.totalCases===0){
      rc.innerHTML=`<div class="result-err">일치하는 경우가 없습니다.<br>다른 스탯 값으로 시도해 주세요 🌸</div>`;
      rc.style.display="block"; return;
    }
    const prob=Math.min((r.hallCases/r.totalCases)*100,99.99).toFixed(4);
    const appear=formatPct((r.exactCount/r.totalPossible)*100);
    const canMax=r.hallCases>0;
    const expect=canMax?(1/(prob/100)).toFixed(2):null;

    rc.innerHTML=`
      <div class="result-strip"></div>
      <div class="result-row">
        <span class="result-label">✦ 성공 확률</span>
        <span class="result-val result-prob">${prob}%</span>
      </div>
      <div class="result-row">
        <span class="result-label">🌸 출현 확률</span>
        <span class="result-val result-appear">${appear}</span>
      </div>
      <div class="result-row">
        <span class="result-label">🍀 성공 기대값</span>
        <span class="result-val result-expect">${canMax?expect+"번":"최대 성장 불가능"}</span>
      </div>
      ${!canMax?'<div class="result-msg">⚠ 현재 스탯으로는 최대 성장에 도달할 수 없어요</div>':''}
    `;
    rc.style.display="block";
  }, 40);
});

["d-atk","d-def","d-agi","d-hp"].forEach(id=>{
